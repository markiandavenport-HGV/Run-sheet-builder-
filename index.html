<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RMU Runsheet</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 14px;
    color: #111;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 28px;
  }

  input, select, button {
    font: inherit;
    min-height: 46px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    width: 100%;
  }

  button {
    background: #eee;
    font-weight: bold;
    cursor: pointer;
  }

  .primary {
    background: #e7f2ff;
    border-color: #8bb8e8;
  }

  .danger {
    background: #ffecec;
    border-color: #e1a5a5;
  }

  .selected {
    background: #d9f7df;
    border-color: #63b96f;
  }

  .top {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .meta {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 8px;
    align-items: center;
    max-width: 520px;
  }

  .meta label {
    font-weight: bold;
  }

  .card {
    border: 1px solid #ddd;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  label {
    font-size: 12px;
    font-weight: bold;
    display: block;
    margin-bottom: 4px;
  }

  .locations {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .location-box {
    border: 1px solid #ddd;
    border-radius: 14px;
    padding: 10px;
    background: #fafafa;
  }

  .location-box h3 {
    margin: 0 0 8px;
  }

  .button-stack {
    display: grid;
    gap: 8px;
  }

  .selection {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
  }

  .selection div {
    border: 1px dashed #aaa;
    border-radius: 12px;
    padding: 10px;
    font-weight: bold;
  }

  .selection span {
    display: block;
    font-size: 12px;
    color: #666;
    font-weight: normal;
  }

  .picker-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .picker-row.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .top-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 10px 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 12px;
  }

  th {
    background: #f3f3f3;
    text-align: left;
    border-bottom: 1px solid #999;
    padding: 8px 6px;
  }

  td {
    border-bottom: 1px solid #ddd;
    padding: 8px 6px;
    word-wrap: break-word;
  }

  .open-row {
    background: #fffceb;
  }

  .open-row td:first-child::after {
    content: " open";
    color: #9a6a00;
    font-size: 10px;
  }

  .nights-row td {
    font-weight: bold;
    border-top: 1px solid #999;
  }

  .small-btn {
    min-height: 30px;
    padding: 4px;
    font-size: 11px;
  }

  .print-title {
    display: none;
  }

  @media (max-width: 760px) {
    .form-grid {
      grid-template-columns: 1fr 1fr;
    }

    .actions {
      grid-template-columns: 1fr;
    }

    .top-actions {
      grid-template-columns: 1fr 1fr;
    }

    table {
      font-size: 10px;
    }
  }

  @media print {
    @page {
      size: A4 landscape;
      margin: 8mm;
    }

    .no-print {
      display: none !important;
    }

    .print-title {
      display: block;
      margin-bottom: 8px;
    }

    table {
      font-size: 9px;
    }

    th, td {
      border-left: none !important;
      border-right: none !important;
      padding: 5px;
    }

    .open-row {
      background: white;
    }

    .open-row td:first-child::after {
      content: "";
    }
  }
</style>
</head>

<body>

<div class="top">
  <h1>RMU Runsheet</h1>

  <div class="meta">
    <label>Driver:</label>
    <input id="driver" value="Mark Davenport">

    <label>Vehicle:</label>
    <input id="vehicleDefault" value="GF20NXM">

    <label>Nights out:</label>
    <select id="nightsOut"></select>
  </div>

  <div class="top-actions no-print">
    <button class="primary" onclick="printPdf()">Export / Save PDF</button>
    <button onclick="downloadCsv()">Export CSV</button>
    <button onclick="copyTable()">Copy table</button>
    <button class="danger" onclick="clearAll()">Clear all</button>
  </div>
</div>

<div class="card no-print">
  <div class="form-grid">
    <div>
      <label>Date picker</label>
      <input id="datePicker" type="date" onchange="updateDateDayFromPicker()">
    </div>

    <div>
      <label>Date / Day on sheet</label>
      <input id="dateDay" placeholder="Mon 27/04/26">
    </div>

    <div>
      <label>Product</label>
      <select id="product">
        <option value="">Select</option>
        <option>Loose</option>
        <option>Bails</option>
      </select>
    </div>

    <div>
      <label>Vehicle</label>
      <input id="vehicle" value="GF20NXM">
    </div>
  </div>

  <div class="locations">
    <div class="location-box">
      <h3>Loaded at</h3>
      <div class="button-stack">
        <button id="load-SUEZ" onclick="chooseLoad('SUEZ','Loose')">SUEZ</button>
        <button id="load-Whites" onclick="chooseLoad('Whites','Loose')">Whites</button>
        <button id="load-Rainham" onclick="chooseLoad('Rainham','Loose')">Rainham</button>
        <button id="load-Crayford" onclick="chooseLoad('Crayford','Bails')">Crayford</button>
      </div>
    </div>

    <div class="location-box">
      <h3>Tipped at</h3>
      <div class="button-stack">
        <button id="tip-Camberley" onclick="chooseTip('Camberley','Loose')">Camberley</button>
        <button id="tip-Oakleaf" onclick="chooseTip('Oakleaf','Loose')">Oakleaf</button>
        <button id="tip-Sheerness" onclick="chooseTip('Sheerness','Bails')">Sheerness</button>
        <button id="tip-Crayford" onclick="chooseTip('Crayford','Loose')">Crayford</button>
      </div>
    </div>
  </div>

  <div class="selection">
    <div><span>Selected loading event</span><p id="loadDisplay">None selected</p></div>
    <div><span>Selected tipping event</span><p id="tipDisplay">None selected</p></div>
  </div>

  <div class="form-grid">
    <div>
      <label>Load ticket number</label>
      <input id="loadTicket" placeholder="RMP-SW8992">
    </div>

    <div>
      <label>Tipped ticket number</label>
      <input id="tipTicket" placeholder="116480">
    </div>

    <div>
      <label>Litres / diesel</label>
      <div class="picker-row">
        <select id="litresHundreds"></select>
        <select id="litresOnes"></select>
      </div>
    </div>

    <div>
      <label>Mileage</label>
      <div class="picker-row three">
        <select id="mileageType">
          <option value="">Mileage</option>
          <option value="Start: ">Start</option>
          <option value="Finish: ">Finish</option>
        </select>
        <select id="mileageThousands"></select>
        <select id="mileageRemainder"></select>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="submitLoadingEvent()">Submit loading event</button>
    <button class="primary" onclick="submitTippingEvent()">Submit tipping event</button>
    <button onclick="startNewBlankRow()">Start new row</button>
    <button onclick="clearCurrentEntry()">Clear entry</button>
    <button onclick="newDay()">Next day</button>
  </div>
</div>

<div class="print-title">
  <strong>RMU Runsheet</strong><br>
  <strong>Driver: <span id="printDriver"></span></strong><br>
  <strong>Vehicle: <span id="printVehicle"></span></strong>
</div>

<table>
  <thead>
    <tr>
      <th>Date / Day</th>
      <th>Loaded at</th>
      <th>Load ticket number</th>
      <th>Tipped at</th>
      <th>Tipped ticket number</th>
      <th>Product</th>
      <th>Vehicle</th>
      <th>Diesel</th>
      <th>Mileage</th>
      <th class="no-print">Edit</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const rowsKey = "rmuRunsheetRowsEventEntryV1";
const settingsKey = "rmuRunsheetSettingsEventEntryV1";

let rows = [];
let selectedLoad = "";
let selectedTip = "";

function el(id) {
  return document.getElementById(id);
}

function pad(num) {
  return String(num).padStart(2, "0");
}

function addOptions(id, start, end, blank, padded) {
  const box = el(id);
  box.innerHTML = "";

  if (blank) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "-";
    box.appendChild(opt);
  }

  for (let i = start; i <= end; i++) {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = padded ? pad(i) : String(i);
    box.appendChild(opt);
  }
}

function initPickers() {
  addOptions("nightsOut", 0, 7, false, false);
  addOptions("litresHundreds", 0, 9, true, false);
  addOptions("litresOnes", 0, 99, true, true);
  addOptions("mileageThousands", 450, 499, true, false);
  addOptions("mileageRemainder", 0, 999, true, true);

  el("nightsOut").value = "4";
}

function saveSettings() {
  localStorage.setItem(settingsKey, JSON.stringify({
    driver: el("driver").value || "Mark Davenport",
    vehicleDefault: el("vehicleDefault").value || "GF20NXM",
    nightsOut: el("nightsOut").value || "4"
  }));
}

function loadSettings() {
  const settings = JSON.parse(localStorage.getItem(settingsKey) || "{}");

  el("driver").value = settings.driver || "Mark Davenport";
  el("vehicleDefault").value = settings.vehicleDefault || "GF20NXM";
  el("vehicle").value = settings.vehicleDefault || "GF20NXM";
  el("nightsOut").value = settings.nightsOut || "4";
}

function saveRows() {
  localStorage.setItem(rowsKey, JSON.stringify(rows));
  saveSettings();
}

function loadRows() {
  rows = JSON.parse(localStorage.getItem(rowsKey) || "[]");
  render();
}

function formatDateForSheet(value) {
  if (!value) return "";

  const date = new Date(value + "T00:00:00");
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

  return `${days[date.getDay()]} ${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${String(date.getFullYear()).slice(-2)}`;
}

function updateDateDayFromPicker() {
  const formatted = formatDateForSheet(el("datePicker").value);
  if (formatted) el("dateDay").value = formatted;
}

function clearSelectedButtons(prefix) {
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(btn => btn.classList.remove("selected"));
}

function chooseLoad(location, product) {
  selectedLoad = location;
  el("loadDisplay").textContent = location;

  clearSelectedButtons("load");
  el(`load-${location}`).classList.add("selected");

  if (!el("product").value) el("product").value = product || "";

  el("loadTicket").focus();
}

function chooseTip(location, product) {
  selectedTip = location;
  el("tipDisplay").textContent = location;

  clearSelectedButtons("tip");
  el(`tip-${location}`).classList.add("selected");

  if (!el("product").value) el("product").value = product || "";

  el("tipTicket").focus();
}

function formatDiesel() {
  const hundreds = el("litresHundreds").value;
  const ones = el("litresOnes").value;

  if (hundreds === "" && ones === "") return "";

  const litres = Number(hundreds || 0) * 100 + Number(ones || 0);
  return litres ? `${litres}L` : "";
}

function formatMileage() {
  const thousands = el("mileageThousands").value;
  const remainder = el("mileageRemainder").value;
  const type = el("mileageType").value || "";

  if (thousands === "" && remainder === "") return "";

  const mileage = Number(thousands || 0) * 1000 + Number(remainder || 0);
  return mileage ? `${type}${mileage} km` : "";
}

function extras() {
  return {
    product: el("product").value.trim(),
    vehicle: el("vehicle").value.trim() || el("vehicleDefault").value || "GF20NXM",
    diesel: formatDiesel(),
    mileage: formatMileage()
  };
}

function applyExtras(row, extra) {
  if (extra.product) row.product = extra.product;
  if (extra.vehicle) row.vehicle = extra.vehicle;
  if (extra.diesel) row.diesel = extra.diesel;
  if (extra.mileage) row.mileage = extra.mileage;
}

function latestOpenRowIndex() {
  for (let i = rows.length - 1; i >= 0; i--) {
    if (rows[i].loadedAt && !rows[i].tippedAt) return i;
  }

  return -1;
}

function submitLoadingEvent() {
  const dateDay = el("dateDay").value.trim();

  if (!dateDay) {
    alert("Please choose a date first.");
    return;
  }

  if (!selectedLoad) {
    alert("Please press a loaded location on the left first.");
    return;
  }

  const extra = extras();

  rows.push({
    dateDay,
    loadedAt: selectedLoad,
    loadTicket: el("loadTicket").value.trim(),
    tippedAt: "",
    tipTicket: "",
    product: extra.product,
    vehicle: extra.vehicle,
    diesel: extra.diesel,
    mileage: extra.mileage
  });

  saveRows();
  render();
  clearCurrentEntry(true);
}

function submitTippingEvent() {
  const dateDay = el("dateDay").value.trim();

  if (!dateDay) {
    alert("Please choose a date first.");
    return;
  }

  if (!selectedTip) {
    alert("Please press a tipped location on the right first.");
    return;
  }

  const extra = extras();
  const openIndex = latestOpenRowIndex();

  if (openIndex >= 0) {
    rows[openIndex].tippedAt = selectedTip;
    rows[openIndex].tipTicket = el("tipTicket").value.trim();
    applyExtras(rows[openIndex], extra);
  } else {
    rows.push({
      dateDay,
      loadedAt: "",
      loadTicket: "",
      tippedAt: selectedTip,
      tipTicket: el("tipTicket").value.trim(),
      product: extra.product,
      vehicle: extra.vehicle,
      diesel: extra.diesel,
      mileage: extra.mileage
    });
  }

  saveRows();
  render();
  clearCurrentEntry(true);
}

function startNewBlankRow() {
  const dateDay = el("dateDay").value.trim();

  if (!dateDay) {
    alert("Please choose a date first.");
    return;
  }

  const extra = extras();

  rows.push({
    dateDay,
    loadedAt: "",
    loadTicket: "",
    tippedAt: "",
    tipTicket: "",
    product: extra.product,
    vehicle: extra.vehicle,
    diesel: extra.diesel,
    mileage: extra.mileage
  });

  saveRows();
  render();
  clearCurrentEntry(true);
}

function render() {
  const tbody = el("tbody");
  tbody.innerHTML = "";

  let previousDay = "";

  rows.forEach((row, index) => {
    const tr = document.createElement("tr");

    if (row.loadedAt && !row.tippedAt) tr.className = "open-row";

    const dayShown = row.dateDay === previousDay ? "" : row.dateDay;
    previousDay = row.dateDay;

    [
      dayShown,
      row.loadedAt,
      row.loadTicket,
      row.tippedAt,
      row.tipTicket,
      row.product,
      row.vehicle,
      row.diesel,
      row.mileage
    ].forEach((value) => {
      const td = document.createElement("td");
      td.textContent = value || "";
      tr.appendChild(td);
    });

    const edit = document.createElement("td");
    edit.className = "no-print";
    edit.innerHTML = `
      <button class="small-btn" onclick="moveUp(${index})">↑</button>
      <button class="small-btn" onclick="moveDown(${index})">↓</button>
      <button class="small-btn" onclick="editRow(${index})">Edit</button>
      <button class="small-btn danger" onclick="deleteRow(${index})">Delete</button>
    `;
    tr.appendChild(edit);

    tbody.appendChild(tr);
  });

  const night = document.createElement("tr");
  night.className = "nights-row";

  ["Nights out:", el("nightsOut").value || "4", "", "", "", "", "", "", ""].forEach(value => {
    const td = document.createElement("td");
    td.textContent = value;
    night.appendChild(td);
  });

  const blank = document.createElement("td");
  blank.className = "no-print";
  night.appendChild(blank);

  tbody.appendChild(night);

  el("printDriver").textContent = el("driver").value || "Mark Davenport";
  el("printVehicle").textContent = el("vehicleDefault").value || "GF20NXM";
}

function editRow(index) {
  const row = rows[index];

  el("dateDay").value = row.dateDay || "";
  selectedLoad = row.loadedAt || "";
  selectedTip = row.tippedAt || "";

  el("loadDisplay").textContent = selectedLoad || "None selected";
  el("tipDisplay").textContent = selectedTip || "None selected";
  el("loadTicket").value = row.loadTicket || "";
  el("tipTicket").value = row.tipTicket || "";
  el("product").value = row.product || "";
  el("vehicle").value = row.vehicle || el("vehicleDefault").value || "GF20NXM";

  clearSelectedButtons("load");
  clearSelectedButtons("tip");

  if (selectedLoad && el(`load-${selectedLoad}`)) el(`load-${selectedLoad}`).classList.add("selected");
  if (selectedTip && el(`tip-${selectedTip}`)) el(`tip-${selectedTip}`).classList.add("selected");

  rows.splice(index, 1);
  saveRows();
  render();
}

function clearCurrentEntry(keepDate = false) {
  selectedLoad = "";
  selectedTip = "";

  el("loadDisplay").textContent = "None selected";
  el("tipDisplay").textContent = "None selected";

  clearSelectedButtons("load");
  clearSelectedButtons("tip");

  el("loadTicket").value = "";
  el("tipTicket").value = "";
  el("product").value = "";
  el("vehicle").value = el("vehicleDefault").value || "GF20NXM";

  el("litresHundreds").value = "";
  el("litresOnes").value = "";
  el("mileageType").value = "";
  el("mileageThousands").value = "";
  el("mileageRemainder").value = "";

  if (!keepDate) {
    el("datePicker").value = "";
    el("dateDay").value = "";
  }
}

function newDay() {
  clearCurrentEntry(false);
  el("datePicker").focus();
}

function deleteRow(index) {
  if (!confirm("Delete this row?")) return;
  rows.splice(index, 1);
  saveRows();
  render();
}

function moveUp(index) {
  if (index <= 0) return;
  [rows[index - 1], rows[index]] = [rows[index], rows[index - 1]];
  saveRows();
  render();
}

function moveDown(index) {
  if (index >= rows.length - 1) return;
  [rows[index + 1], rows[index]] = [rows[index], rows[index + 1]];
  saveRows();
  render();
}

function clearAll() {
  if (!confirm("Clear all rows?")) return;
  rows = [];
  saveRows();
  render();
}

function printPdf() {
  saveSettings();
  render();
  window.print();
}

function csvEscape(value) {
  value = String(value ?? "");

  if (value.includes(",") || value.includes('"') || value.includes("\n")) {
    return '"' + value.replaceAll('"', '""') + '"';
  }

  return value;
}

function downloadCsv() {
  const headers = [
    "Date / Day",
    "Loaded at",
    "Load ticket number",
    "Tipped at",
    "Tipped ticket number",
    "Product",
    "Vehicle",
    "Diesel",
    "Mileage"
  ];

  let previousDay = "";
  const csv = [headers.map(csvEscape).join(",")];

  rows.forEach(row => {
    const dayShown = row.dateDay === previousDay ? "" : row.dateDay;
    previousDay = row.dateDay;

    csv.push([
      dayShown,
      row.loadedAt,
      row.loadTicket,
      row.tippedAt,
      row.tipTicket,
      row.product,
      row.vehicle,
      row.diesel,
      row.mileage
    ].map(csvEscape).join(","));
  });

  csv.push(["Nights out:", el("nightsOut").value || "4", "", "", "", "", "", "", ""].map(csvEscape).join(","));

  const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "rmu-runsheet.csv";
  a.click();

  URL.revokeObjectURL(url);
}

async function copyTable() {
  const headers = [
    "Date / Day",
    "Loaded at",
    "Load ticket number",
    "Tipped at",
    "Tipped ticket number",
    "Product",
    "Vehicle",
    "Diesel",
    "Mileage"
  ];

  let previousDay = "";
  const lines = [headers.join("\t")];

  rows.forEach(row => {
    const dayShown = row.dateDay === previousDay ? "" : row.dateDay;
    previousDay = row.dateDay;

    lines.push([
      dayShown,
      row.loadedAt,
      row.loadTicket,
      row.tippedAt,
      row.tipTicket,
      row.product,
      row.vehicle,
      row.diesel,
      row.mileage
    ].join("\t"));
  });

  lines.push(["Nights out:", el("nightsOut").value || "4", "", "", "", "", "", "", ""].join("\t"));

  await navigator.clipboard.writeText(lines.join("\n"));
  alert("Table copied. You can paste it into Excel or Google Sheets.");
}

["driver", "vehicleDefault", "nightsOut"].forEach(id => {
  document.addEventListener("input", event => {
    if (event.target && event.target.id === id) {
      if (id === "vehicleDefault") {
        el("vehicle").value = el("vehicleDefault").value || "GF20NXM";
      }

      saveSettings();
      render();
    }
  });
});

initPickers();
loadSettings();
loadRows();
</script>

</body>
</html>
